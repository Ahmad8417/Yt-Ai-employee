[options]
; AI Employee - Odoo 19 Configuration
; This is the main Odoo configuration file for Gold Tier integration

; Basic Configuration
admin_passwd = ${ODOO_ADMIN_PASSWORD:-admin}
db_host = db
db_port = 5432
db_user = odoo
db_password = ${POSTGRES_PASSWORD:-odoo}
db_name = ${ODOO_DB:-ai_employee_db}

; Addons paths
addons_path = /mnt/extra-addons

; Data directory
data_dir = /var/lib/odoo

; Logging
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = [':INFO']

; Performance settings
workers = 2
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Network settings
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Email configuration (for invoice notifications)
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_user = your-email@gmail.com
; smtp_password = your-app-password
; smtp_ssl = False
; smtp_tls = True

; Security
list_db = False

; Session settings
session_gc = 100000

; Without demo data
without_demo = True
